name: Pytest

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test.yaml"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/test.yaml"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          version: "0.11.28"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Run pytest
        run: uv run pytest tests/
