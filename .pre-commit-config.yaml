default_language_version:
  python: python3.12

default_install_hook_types:
  - pre-commit

exclude: |
  (?x)^(
    docs/_build/|
    \.venv/|
    dist/|
    \.pytest_cache/|
    \.ruff_cache/|
    \.pytest_benchmark/
  )

minimum_prek_version: "0.4.0"

ci:
  autofix_commit_msg: |
    [prek] auto fixes from pre-commit hooks
  autoupdate_commit_msg: |
    [prek] pre-commit autoupdate

repos:
  # Fast Rust-native hygiene checks (prek builtin — no venv, no clone).
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-new-submodules

  # Hooks without a prek builtin equivalent.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

  # Linting and formatting — single toolchain, replaces flake8/isort/black.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix, --show-fixes]
      - id: ruff-format
        types_or: [python, pyi]

  # Static type checking.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies: []
        args: [--config-file=pyproject.toml]

  # Security linting for application code.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        exclude: ^tests/

  # Spelling in prose and docstrings.
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --write-changes
          - --ignore-words-list=nlp,shapley,shap,explainability,pyproject,toml,venv,prek,autosummary,intersphinx,napoleon,myst,pydata,sdist,wheel,readonly,kwargs,args,init,utils,backend,frontend,untracked,workflow,workflows,pytest,cov
        exclude: |
          (?x)^(
            uv\.lock|
            LICENSE|
            docs/_build/
          )

  # Project integrity checks via the repo toolchain.
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock check
        entry: uv lock --check
        language: system
        pass_filenames: false
        always_run: true
