default_language_version:
  python: python3.12

default_install_hook_types:
  - pre-commit

exclude: |
  (?x)^(
    docs/_build/|
    \.venv/|
    dist/|
    \.pytest_cache/|
    \.ruff_cache/|
    \.pytest_benchmark/
  )

minimum_prek_version: "0.4.0"

ci:
  autofix_commit_msg: |
    [prek] auto fixes from pre-commit hooks
  autoupdate_commit_msg: |
    [prek] pre-commit autoupdate

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-new-submodules

  - repo: local
    hooks:
      - id: name-tests-test
        name: python tests naming
        entry: >-
          bash -c 'status=0; for f in "$@"; do base=$(basename "$f");
          case "$base" in conftest.py|__init__.py|_*) continue ;; test_*.py) ;; *)
          echo "Test files must be named test_*.py -> $f"; status=1;; esac; done;
          exit $status'
        language: system
        files: ^tests/.*\.py$
        pass_filenames: true

      - id: uv-lock
        name: uv lock check
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        always_run: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - numpy>=2.0.0,<3.0.0
          - pydantic>=2.11.0,<3.0.0
          - types-PyYAML>=6.0.12.20250915
        args: [--config-file=pyproject.toml]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        exclude: ^tests/

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=nlp,shapley,shap,explainability,pyproject,toml,venv,prek,autosummary,intersphinx,napoleon,myst,pydata,sdist,wheel,readonly,kwargs,args,init,utils,backend,frontend,untracked,workflow,workflows,pytest,cov
        exclude: |
          (?x)^(
            uv\.lock|
            LICENSE|
            docs/_build/|
            examples/.*\.ipynb
          )
