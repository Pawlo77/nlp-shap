backend:
  kind: transformers
  model_id: hf-internal-testing/tiny-random-gpt2
  api_host: null

generation:
  max_new_tokens: 8
  temperature: 0.0
  top_k: 1
  precompute_base: true

explanation:
  estimand: shapley
  estimator: exact
  value_fn: tfidf_cosine
  normalizer: identity
  players: tokens
  absence_policy: pad
  budget:
    fraction: 1.0
  include_minimal_masks: false
  max_inflight: 1
  archive:
    path: ""
    flush_every: 50
  dedup:
    enabled: auto
  kv_cache:
    enabled: true
  embedding_mode: static
  seed: 0
